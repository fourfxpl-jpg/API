<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BabyDek — Key Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
  :root {
    --bg: #08060c;
    --bg2: #0f0b16;
    --bg3: #1a1024;
    --accent: #ff6eb9;
    --accent2: #b46eff;
    --gold: #ffc86e;
    --text: #ebdcf8;
    --dim: #5a4173;
    --err: #ff3c5a;
    --ok: #52ffb8;
    --border: rgba(255,110,185,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,110,185,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,110,185,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    z-index: 100;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
    position: relative; z-index: 1;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  /* Login Overlay */
  #loginOverlay {
    position: fixed; inset: 0;
    background: rgba(8,6,12,0.97);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(10px);
  }
  .login-box {
    background: var(--bg2);
    border: 1px solid var(--accent);
    padding: 40px 50px;
    width: 380px;
    border-radius: 8px;
    position: relative;
  }
  .login-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .login-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
  }
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    border-radius: 4px;
  }
  input:focus { border-color: var(--accent); outline: none; }
  button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    letter-spacing: 1px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  button:hover { background: #ff9ed4; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

  /* Create Panel */
  .create-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 32px;
  }
  .panel-title {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .create-row {
    display: grid;
    grid-template-columns: 2fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--bg3);
    padding: 14px 16px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
  }
  td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,110,185,0.08);
  }
  .key-val {
    color: var(--gold);
    cursor: pointer;
    font-family: monospace;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
  }
  .badge-ok { background: rgba(82,255,184,0.1); color: var(--ok); }
  .badge-err { background: rgba(255,60,90,0.1); color: var(--err); }
  .actions button {
    font-size: 10px;
    padding: 5px 10px;
    margin: 0 2px;
  }
  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--bg2);
    border: 1px solid var(--accent);
    padding: 14px 20px;
    border-radius: 6px;
    z-index: 10000;
    opacity: 0;
    transition: all 0.3s;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>BabyDek Admin</h2>
    <p style="text-align:center; color:var(--dim); margin-bottom:24px;">Enter your admin token</p>
    <div class="field">
      <label>ADMIN TOKEN</label>
      <input type="password" id="tokenInput" placeholder="babydek-admin-2025" autocomplete="off">
    </div>
    <button onclick="doLogin()">LOGIN →</button>
    <p id="loginErr" style="color:var(--err); text-align:center; margin-top:12px; min-height:20px;"></p>
  </div>
</div>

<div class="container">
  <header>
    <div class="logo">
      <h1>BabyDek</h1>
      <span>Key Management</span>
    </div>
    <div>
      <span id="serverStatus" style="color:var(--dim);">● Disconnected</span>
      <button onclick="refresh()" style="margin-left:15px; background:transparent; border:1px solid var(--accent); color:var(--accent); padding:6px 12px; font-size:12px;">REFRESH</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Keys</div></div>
    <div class="stat-card"><div class="stat-val" id="statActive">0</div><div class="stat-label">Active</div></div>
    <div class="stat-card"><div class="stat-val" id="statBound">0</div><div class="stat-label">Bound HWID</div></div>
    <div class="stat-card"><div class="stat-val" id="statRevoked">0</div><div class="stat-label">Revoked</div></div>
  </div>

  <!-- Create New Key -->
  <div class="create-panel">
    <div class="panel-title">CREATE NEW KEY</div>
    <div class="create-row">
      <div class="field">
        <label>LABEL / NOTE</label>
        <input type="text" id="newLabel" placeholder="เช่น John Discord">
      </div>
      <div class="field">
        <label>EXPIRES (OPTIONAL)</label>
        <input type="date" id="newExpiry">
      </div>
      <button onclick="createKey()">+ GENERATE</button>
    </div>
  </div>

  <!-- Keys Table -->
  <div class="table-wrap">
    <div class="panel-title" style="padding:16px 20px; border-bottom:1px solid var(--border);">ALL KEYS</div>
    <table>
      <thead>
        <tr>
          <th>KEY</th>
          <th>LABEL</th>
          <th>STATUS</th>
          <th>HWID</th>
          <th>USES</th>
          <th>EXPIRES</th>
          <th>LAST USED</th>
          <th>ACTIONS</th>
        </tr>
      </thead>
      <tbody id="keyTable"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
let ADMIN_TOKEN = '';
let allKeys = [];

// Login
async function doLogin() {
  const token = document.getElementById('tokenInput').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  if (!token) {
    errEl.textContent = 'กรุณาใส่ Admin Token';
    return;
  }

  ADMIN_TOKEN = token;

  try {
    const res = await fetch('/api/admin/keys', {
      headers: { 'x-admin-token': token }
    });

    if (res.status === 401) {
      errEl.textContent = '✕ Invalid Token';
      return;
    }
    if (!res.ok) throw new Error();

    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('serverStatus').textContent = '● Connected';
    document.getElementById('serverStatus').style.color = 'var(--ok)';
    
    refresh();
  } catch (e) {
    errEl.textContent = '✕ Connection Error';
  }
}

// Refresh Data
async function refresh() {
  try {
    const res = await fetch('/api/admin/keys', {
      headers: { 'x-admin-token': ADMIN_TOKEN }
    });
    if (!res.ok) throw new Error();
    const keys = await res.json();
    allKeys = keys;
    renderTable(keys);
    updateStats(keys);
  } catch (e) {
    console.error(e);
  }
}

function updateStats(keys) {
  document.getElementById('statTotal').textContent = keys.length;
  document.getElementById('statActive').textContent = keys.filter(k => k.active).length;
  document.getElementById('statBound').textContent = keys.filter(k => k.hwid).length;
  document.getElementById('statRevoked').textContent = keys.filter(k => !k.active).length;
}

function renderTable(keys) {
  const tbody = document.getElementById('keyTable');
  if (!keys || keys.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:60px; color:var(--dim);">ยังไม่มีคีย์ กรุณาสร้างใหม่</td></tr>`;
    return;
  }

  tbody.innerHTML = keys.map(k => {
    const expired = k.expiresAt && new Date(k.expiresAt) < new Date();
    const statusHTML = !k.active ? `<span class="badge badge-err">REVOKED</span>` :
                       expired ? `<span class="badge badge-err">EXPIRED</span>` :
                       `<span class="badge badge-ok">ACTIVE</span>`;

    return `
      <tr>
        <td><span class="key-val" onclick="copyKey('${k.key}')">${k.key}</span></td>
        <td>${k.label || '<span style="color:var(--dim)">—</span>'}</td>
        <td>${statusHTML}</td>
        <td>${k.hwid ? k.hwid.substring(0,12)+'...' : '<span style="color:var(--dim)">—</span>'}</td>
        <td>${k.uses || 0}</td>
        <td>${k.expiresAt ? k.expiresAt.slice(0,10) : '∞'}</td>
        <td>${k.lastUsed ? new Date(k.lastUsed).toLocaleDateString('th-TH') : '—'}</td>
        <td>
          <button onclick="revokeKey('${k.key}')" style="background:#ff3c5a;color:white;">${k.active ? 'REVOKE' : 'RESTORE'}</button>
          ${k.hwid ? `<button onclick="resetHwid('${k.key}')" style="background:#ffc86e;color:black;">RESET HWID</button>` : ''}
          <button onclick="deleteKey('${k.key}')" style="background:#333;color:white;">DELETE</button>
        </td>
      </tr>`;
  }).join('');
}

// Actions
async function createKey() {
  const label = document.getElementById('newLabel').value.trim();
  const expiresAt = document.getElementById('newExpiry').value || null;

  await fetch('/api/admin/keys', {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json',
      'x-admin-token': ADMIN_TOKEN 
    },
    body: JSON.stringify({ label, expiresAt })
  });
  document.getElementById('newLabel').value = '';
  refresh();
  toast('สร้างคีย์สำเร็จ');
}

async function revokeKey(key) {
  await fetch(`/api/admin/keys/${key}/revoke`, { 
    method: 'PATCH', 
    headers: { 'x-admin-token': ADMIN_TOKEN } 
  });
  refresh();
}

async function resetHwid(key) {
  await fetch(`/api/admin/keys/${key}/reset-hwid`, { 
    method: 'PATCH', 
    headers: { 'x-admin-token': ADMIN_TOKEN } 
  });
  refresh();
  toast('รีเซ็ต HWID สำเร็จ');
}

async function deleteKey(key) {
  if (confirm(`ลบคีย์ ${key} ถาวร?`)) {
    await fetch(`/api/admin/keys/${key}`, { 
      method: 'DELETE', 
      headers: { 'x-admin-token': ADMIN_TOKEN } 
    });
    refresh();
  }
}

function copyKey(key) {
  navigator.clipboard.writeText(key);
  toast('คัดลอกคีย์แล้ว: ' + key);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Enter key support
document.getElementById('tokenInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
